spring.application.name=backend
server.port=8001

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:digital_brain.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Ignore missing SQLite sequences table since it's an existing DB
spring.jpa.properties.hibernate.dialect.sqlite.foreign_keys=true

# JWT Secret Key (Should ideally be generated dynamically or in env variables)
jwt.secret=your_super_secret_key_which_must_be_at_least_256_bits_long_digital_brain_app
jwt.expiration=14400000

# File upload path
file.upload-dir=uploads
