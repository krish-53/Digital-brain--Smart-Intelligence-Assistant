<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Brain - Personal Intelligence System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- AUTHENTICATION SCREEN -->
    <div id="auth-container" class="auth-wrapper">
        <div class="glass-panel auth-panel">
            <h1 class="logo-text">DIGITAL<span>BRAIN</span></h1>
            <p class="subtitle">Your Personal Intelligence System</p>
            
            <div class="auth-toggle">
                <button id="toggle-login" class="auth-tab active">Login</button>
                <button id="toggle-register" class="auth-tab">Register</button>
            </div>
            
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-submit-btn" class="btn-primary">Login</button>
                <p id="auth-message" class="error-msg"></p>
            </form>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app-container" class="app-layout hidden">
        <!-- SIDEBAR -->
        <nav class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2 class="logo-text-small">DIGITAL<span>BRAIN</span></h2>
            </div>
            <ul class="nav-links">
                <li class="active" data-page="dashboard">Dashboard</li>
                <li data-page="activity">Activity Tracker</li>
                <li data-page="ideas">Idea Network</li>
                <li data-page="files">Smart File Analyzer</li>
                <li data-page="habits">Habit Predictor</li>
                <li data-page="decisions">Decision Helper</li>
            </ul>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
        </nav>

        <!-- MAIN CONTENT AREA -->
        <main class="main-content">
            <header class="top-header glass-panel">
                <h2 id="current-page-title">Dashboard</h2>
                <div class="user-profile">
                    <span id="welcome-text">User</span>
                    <div class="avatar"></div>
                </div>
            </header>
            
            <div id="content-area" class="content-wrapper">
                <!-- Pages injected here by JS -->
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
